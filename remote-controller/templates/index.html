<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key State Tracker with Video Feed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 20px;
            width: 100%;
            text-align: center;
        }

        #main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 1200px;
            position: relative;
        }

        #video-feed {
            width: 600px;
            height: 400px;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        #video-feed.hidden {
            display: none;
        }

        #video-feed.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1000;
            background-color: #000;
        }

        #controls-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        #controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .control-button {
            width: 50px;
            height: 50px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .control-button:hover {
            background-color: #0056b3;
        }

        #interval-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #log-container {
            width: 600px;
            margin-top: 20px;
            position: relative;
        }

        #log {
            padding: 10px;
            width: 100%;
            border: 1px solid #000;
            max-height: 400px;
            overflow-y: auto;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: none; /* Initially hidden */
        }

        #log-container button {
            width: 100%;
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            text-align: center;
        }

        #log-container button:hover {
            background-color: #0056b3;
        }

        .log-entry {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div id="main-container">
        <h1>Remote Control</h1>

        <div id="controls-container">

            <div id="controls">
                <button class="control-button" onclick="sendState('up')">↑</button>
                <button class="control-button" onclick="sendState('left')">←</button>
                <button class="control-button" onclick="sendState('stop')">⏹️</button>
                <button class="control-button" onclick="sendState('right')">→</button>
                <button class="control-button" onclick="sendState('down')">↓</button>
            </div>

            <div id="interval-control">
                <label for="interval-slider">Request Interval (ms):</label>
                <input type="range" id="interval-slider" min="50" max="2000" value="1000" step="20" oninput="updateInterval(this.value)">
                <span id="interval-display">1000</span> ms
            </div>
        </div>

        <div id="log-container">
            <button onclick="toggleLog()">Show/Hide Log</button>
            <div id="log"></div>
        </div>
    </div>

    <script>
        let keyState = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };

        let requestInterval = 1000;
        let intervalId;
	

        function updateKeyState(event, isPressed) {
            if (keyState.hasOwnProperty(event.key)) {
                keyState[event.key] = isPressed;
            }

            updateAndSendState();
        }

        function sendState(state) {
            fetch('/update_state', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ state: state })
            })
            .then(response => response.json())
            .then(data => console.log(data));

            updateLog(state);
        }

        function updateAndSendState() {
            let state = '';
            if (keyState.ArrowUp) state += 'up';
            if (keyState.ArrowDown) state += 'down';
            if (keyState.ArrowLeft) state += 'left';
            if (keyState.ArrowRight) state += 'right';

            if (state === '') state = 'stop';

            sendState(state);
        }

        function updateLog(state) {
            const logDiv = document.getElementById('log');
            const newLogEntry = document.createElement('div');
            newLogEntry.className = 'log-entry';
            newLogEntry.textContent = `State: ${state} - ${new Date().toLocaleTimeString()}`;
            logDiv.appendChild(newLogEntry);

            // Scroll to the bottom of the log
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateInterval(newInterval) {
            requestInterval = newInterval;
            document.getElementById('interval-display').textContent = newInterval;

            // Clear the existing interval and set a new one with the updated interval
            clearInterval(intervalId);
            intervalId = setInterval(updateAndSendState, requestInterval);
        }

        function toggleLog() {
            const logDiv = document.getElementById('log');
            if (logDiv.style.display === 'none' || logDiv.style.display === '') {
                logDiv.style.display = 'block';
            } else {
                logDiv.style.display = 'none';
            }
        }

        document.addEventListener('keydown', (event) => {
            updateKeyState(event, true);
        });

        document.addEventListener('keyup', (event) => {
            updateKeyState(event, false);
        });

        intervalId = setInterval(updateAndSendState, requestInterval);
    </script>
</body>
</html>
