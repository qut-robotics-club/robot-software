<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Camera Feed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1f1f1f;
            color: #ccc;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        h1 {
            color: #ddd;
            margin-bottom: 20px;
        }

        .video-container {
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        #video-feed {
            width: 100%;
            max-width: 800px;
            height: auto;
            border-radius: 10px;
        }

        .credit {
            margin-top: 20px;
            font-size: 0.9em;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>Real-Time Camera Feed</h1>

    <div class="video-container">
        <img id="video-feed" src="/video_feed_0" alt="Video Feed">
    </div>

    <div class="credit">
        Developed by Atticus D'Mello
    </div>

</body>
</html>
